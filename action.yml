name: "Setup WABT"
description: "Setup WebAssembly Binary Toolkit"
branding:
  icon: download
  color: purple
inputs:
  version:
    description: "Version to Install"
    default: "latest"
runs:
  using: "composite"
  steps:
    - name: Setup WABT
      shell: bash
      run: |
        set -e
        VERSION="${{ inputs.version }}"
        TEMP=$(mktemp -d)

        if [ "$VERSION" = 'canary' ]; then
          echo -e "\033[36mCloning Source to $TEMP/wabt\033[0m"
          gh repo clone WebAssembly/wabt "$TEMP/wabt" -- --recurse-submodules

          echo -e "\033[36mBuilding...\033[0m"
          cmake \
            -S "$TEMP/wabt" \
            -B "$TEMP/wabt/build" \
            -DCMAKE_INSTALL_PREFIX="$TEMP" \
            -DCMAKE_BUILD_TYPE=RELEASE
          cmake --build "$TEMP/wabt/build" --config RELEASE --target install

          echo -e "\033[36mCleaning Up...\033[0m"
          rm -rf "$TEMP/wabt"
          rm -rf "$TEMP/include"
          rm -rf "$TEMP/lib"
          rm -rf "$TEMP/share"
        else
          if [ "$VERSION" = 'latest' ]; then
            echo -e "\033[36mFetching Versions...\033[0m"
            VERSION=$(gh release view \
              --repo WebAssembly/wabt \
              --json tagName -q .tagName)
            echo -e "\033[36mLatest Version: $VERSION\033[0m"
          else
            echo -e "\033[36mProvided Version: $VERSION\033[0m"
          fi

          for ASSET in $(gh release view $VERSION \
            --repo WebAssembly/wabt \
            --json assets \
            -q '.assets[].name | select(test("\\.tar\\.gz$"))');
          do
            echo -e "\033[36mFound: $ASSET\033[0m"
            mkdir "$TEMP/wabt"
            gh release download $VERSION \
              --repo WebAssembly/wabt \
              --pattern $ASSET \
              -O - \
              | tar -xzC $TEMP/wabt --strip-components=1

            if "$TEMP/wabt/bin/wat2wasm" --version >/dev/null 2>&1; then
              break
            fi
            echo "\033[36mBad Find\033[0m"
            rm -rf "$TEMP/wabt"
          done
          if ! "$TEMP/wabt/bin/wat2wasm" --version >/dev/null 2>&1; then
            echo "\033[36mNo Assets Work!\033[0m"
            exit 1
          fi

          echo "\033[36mCleaning Up...\033[0m"
          mv "$TEMP/wabt/bin" "$TEMP/bin"
          rm -rf "$TEMP/wabt"
        fi

        echo -e "\033[36mls $TEMP/bin\033[0m"
        ls $TEMP/bin

        echo -e "\033[36mAdding $TEMP/bin to PATH\033[0m"
        echo -e "$(cd "$TEMP/bin" && pwd -W 2>/dev/null || pwd)" >> $GITHUB_PATH
